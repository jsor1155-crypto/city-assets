name: Deploy Vite React App

on:
  push:
    branches: ["master", "main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Auto-detect Project Directory and Build
        run: |
          # Find where package.json actually lives
          TARGET_DIR=$(find . -name package.json -not -path "*/node_modules/*" -exec dirname {} \;)
          echo "Found package.json in directory: $TARGET_DIR"
          cd "$TARGET_DIR"
          
          # Run the installation and compilation inside that directory
          npm install
          npm run build
          
          # Move the compiled assets to a unified global dist folder for deployment
          mkdir -p ../dist
          cp -r dist/* ../dist/ || cp -r build/* ../dist/ || echo "Using root distribution"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
